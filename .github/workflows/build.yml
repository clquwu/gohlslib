name: build

on:
  push:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    env:
      CGO_ENABLED: "0"

    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-go@v6
      with:
        go-version: "1.26"
        cache: true

    - name: Build all packages
      run: go build -v ./...

    - name: Test all packages
      run: go test -v ./...

    - name: Create source artifact
      run: |
        mkdir -p dist
        git archive --format=tar.gz --output "dist/gohlslib-${{ github.sha }}.tar.gz" HEAD

    - name: Upload source artifact
      uses: actions/upload-artifact@v4
      with:
        name: gohlslib-source-${{ github.sha }}
        path: dist/gohlslib-${{ github.sha }}.tar.gz
        if-no-files-found: error
