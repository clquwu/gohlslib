name: build

on:
  push:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    env:
      CGO_ENABLED: "0"

    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-go@v6
      with:
        go-version: "1.26"
        cache: true

    - name: Build all packages
      run: go build -v ./...

    - name: Test all packages
      run: go test -v ./...
